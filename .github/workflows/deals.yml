name: Electronics Deals Bot

on:
  schedule:
    # Every 15 minutes — GitHub Actions minimum is 5 min, so we run every 15
    - cron: "*/15 * * * *"
  workflow_dispatch:       # run manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-bot.txt

      - name: Install dependencies
        run: pip install -r requirements-bot.txt

      - name: Test credentials & connectivity
        env:
          DEALS_BOT_TOKEN: ${{ secrets.DEALS_BOT_TOKEN }}
          DEALS_CHANNEL_ID: ${{ secrets.DEALS_CHANNEL_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        continue-on-error: true
        run: python -m bot.test_setup

      - name: Debug scraper selectors
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python -m bot.debug_scrapers

      - name: Send test deal to Telegram
        env:
          DEALS_BOT_TOKEN: ${{ secrets.DEALS_BOT_TOKEN }}
          DEALS_CHANNEL_ID: ${{ secrets.DEALS_CHANNEL_ID }}
        run: python -m bot.main --send-test

      - name: Run deals bot
        env:
          DEALS_BOT_TOKEN: ${{ secrets.DEALS_BOT_TOKEN }}
          DEALS_CHANNEL_ID: ${{ secrets.DEALS_CHANNEL_ID }}
          MIN_DISCOUNT_PERCENT: ${{ vars.MIN_DISCOUNT_PERCENT || '15' }}
          MAX_PRICE_SAR: ${{ vars.MAX_PRICE_SAR || '0' }}
          MIN_PRICE_SAR: ${{ vars.MIN_PRICE_SAR || '0' }}
          ALLOWED_CATEGORIES: ${{ vars.ALLOWED_CATEGORIES || '' }}
          REQUIRED_KEYWORDS: ${{ vars.REQUIRED_KEYWORDS || '' }}
          MAX_DEALS_PER_SITE: ${{ vars.MAX_DEALS_PER_SITE || '30' }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DB_PATH: /tmp/deals.db
        run: python -m bot.main

      # Note: the DB is ephemeral per-run on GitHub Actions.
      # To avoid re-posting the same deals across runs, the bot will re-post
      # deals that were already sent in a previous run. For persistent
      # deduplication, use the artifact upload below or run the bot on a
      # dedicated server using --daemon mode.

      - name: Cache DB between runs (best-effort)
        uses: actions/cache@v4
        with:
          path: /tmp/deals.db
          key: deals-db-${{ github.run_id }}
          restore-keys: deals-db-
