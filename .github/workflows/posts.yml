name: LinkedIn posts search

on:
  schedule:
    # Every 2 hours. Off-peak minute: on-the-hour crons are often dropped
    # by GitHub under load. Note GitHub may still delay scheduled runs.
    - cron: "41 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Shared with the jobs workflow so the two never push at the same time.
concurrency:
  group: update-data

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Search for posts
        run: python scraper/search_posts.py
        env:
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR: ${{ vars.APIFY_ACTOR }}
          APIFY_INPUT: ${{ vars.APIFY_INPUT }}

      - name: Commit updated post list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/posts/data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update post list ($(date -u +'%F %H:%M'))"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
