name: Weekly job market report

on:
  schedule:
    # Sundays 05:07 UTC = 08:07 Riyadh, ready before posting time.
    - cron: "7 5 * * 0"
  workflow_dispatch:

permissions:
  contents: write

# Shared with the jobs/posts workflows so pushes never clash.
concurrency:
  group: update-data

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements-report.txt

      - name: Generate report
        run: python scraper/weekly_report.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly market report ($(date -u +%F))"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
