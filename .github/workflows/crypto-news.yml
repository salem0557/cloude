name: Crypto news

on:
  schedule:
    # Off-the-hour minute to avoid GitHub's busy on-the-hour crons.
    - cron: "37 * * * *" # every hour
  workflow_dispatch:

permissions:
  contents: write

# Shared with the jobs workflow so the two never push at the same time.
concurrency:
  group: update-data

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Collect crypto news and rumours
        run: python scraper/crypto_news.py

      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/crypto/data/news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update crypto news ($(date -u +%F))"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
